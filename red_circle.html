<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>jsPsych Experiment - Red Circle</title>
  
  <!-- jsPsych Core Library (v7.3.4) -->
  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  
  <!-- html-keyboard-response plugin -->
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
  
  <!-- Default jsPsych CSS -->
  <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
  
  <style>
    /* 1. 背景色を灰色 (#808080) に設定 */
    body {
      background-color: #808080;
      color: white; /* テキストが見えやすいように白に設定 */
      margin: 0;
      padding: 0;
    }

    /* jsPsychのコンテンツエリアを画面いっぱいに広げる設定 */
    .jspsych-content-wrapper {
      background-color: #808080;
    }

    /* 2. 直径100pxの赤い円を描画するためのスタイル */
    .red-circle {
      width: 100px;
      height: 100px;
      background-color: #ff0000; /* 赤色 */
      border-radius: 50%;       /* 正方形を円にする */
      margin: 0 auto;           /* 中央寄せ用 */
    }
  </style>
</head>
<body>
</body>
<script>
  // jsPsychの初期化
  const jsPsych = initJsPsych({
    on_finish: function() {
      // 実験終了時にデータを表示
      jsPsych.data.displayData();
    }
  });

  const timeline = [];

  // 円の提示トライアル
  const circle_trial = {
    type: jsPsychHtmlKeyboardResponse,
    // HTMLとCSSのクラス名を使って円を表示
    stimulus: `
      <div style="text-align: center;">
        <div class="red-circle"></div>
        <p style="margin-top: 20px; font-size: 18px;">
          スペースキーを押して終了してください
        </p>
      </div>
    `,
    // 3. スペースキーが押されるまで表示し続ける
    choices: [' '], 
    // 反応時間の計測やデータの記録
    data: {
      task: 'response_to_circle'
    }
  };
  timeline.push(circle_trial);

  // 4. 終了メッセージの表示
  const end_screen = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <div style="text-align: center;">
        <h2>実験が終了しました</h2>
        <p>ご協力ありがとうございました。</p>
        <p>何かキーを押すとデータが表示されます。</p>
      </div>
    `,
    choices: "ALL_KEYS"
  };
  timeline.push(end_screen);

  // 実験の実行
  jsPsych.run(timeline);
</script>
</html>
