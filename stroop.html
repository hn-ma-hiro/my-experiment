<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stroop Task - jsPsych</title>
    <!-- jsPsych v7.3 CDN -->
    <script src="https://unpkg.com/jspsych@7.3.1"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.2"></script>
    <link href="https://unpkg.com/jspsych@7.3.1/css/jspsych.css" rel="stylesheet" type="text/css" />
    <style>
        /* 画面デザインの定義 */
        body {
            background-color: #FFFFFF;
            color: #333333;
            font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* 教示用テキストスタイル */
        .instruction-text {
            font-size: 24px;
            line-height: 1.6;
            text-align: center;
        }

        /* 刺激（ターゲット）用スタイル */
        .stimulus-text {
            font-size: 60px;
            font-weight: bold;
        }

        /* 注視点スタイル */
        .fixation {
            font-size: 60px;
        }

        /* データ表示エリアの調整 */
        #jspsych-content {
            max-width: 800px;
        }
    </style>
</head>
<body>
    <script>
        /**
         * jsPsychの初期化
         */
        const jsPsych = initJsPsych({
            on_finish: function() {
                // 実験終了時にCSV形式でデータを画面に表示
                // 全画面エラーを避けるため、そのままデータ表示に移行
                jsPsych.data.displayData('csv');
            }
        });

        // タイムラインの作成
        const timeline = [];

        /**
         * (1) 教示画面
         * 権限エラー回避のため、全画面化プラグインを削除し、ここから開始します
         */
        const instructions = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: `
                <div class="instruction-text">
                    <p>【ストループ課題】</p>
                    <p>文字の「色」をキーボードで答えてください。</p>
                    <div style="text-align: left; display: inline-block; margin: 20px 0;">
                        <p>・赤色の文字なら <kbd>r</kbd> キー</p>
                        <p>・青色の文字なら <kbd>b</kbd> キー</p>
                        <p>・緑色の文字なら <kbd>g</kbd> キー</p>
                    </div>
                    <p>準備ができたら、<strong>スペースキー</strong>を押して開始します。</p>
                </div>
            `,
            choices: [' ']
        };
        timeline.push(instructions);

        /**
         * (2) 刺激の要因計画
         */
        const stimulus_factors = [
            // 一致条件 (Congruent)
            { word: "赤", color: "red", condition: "congruent", correct_response: "r" },
            { word: "青", color: "blue", condition: "congruent", correct_response: "b" },
            { word: "緑", color: "green", condition: "congruent", correct_response: "g" },
            // 不一致条件 (Incongruent)
            { word: "赤", color: "blue", condition: "incongruent", correct_response: "b" },
            { word: "赤", color: "green", condition: "incongruent", correct_response: "g" },
            { word: "青", color: "red", condition: "incongruent", correct_response: "r" },
            { word: "青", color: "green", condition: "incongruent", correct_response: "g" },
            { word: "緑", color: "red", condition: "incongruent", correct_response: "r" },
            { word: "緑", color: "blue", condition: "incongruent", correct_response: "b" }
        ];

        /**
         * (3-a) 注視点表示
         */
        const fixation = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: '<div class="fixation">+</div>',
            choices: "NO_KEYS",
            trial_duration: 500,
            data: { task: 'fixation' }
        };

        /**
         * (3-b) 刺激提示試行
         */
        const stroop_trial = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: function() {
                const word = jsPsych.timelineVariable('word');
                const color = jsPsych.timelineVariable('color');
                return `<div class="stimulus-text" style="color: ${color};">${word}</div>`;
            },
            choices: ['r', 'b', 'g'],
            data: {
                task: 'response',
                word: jsPsych.timelineVariable('word'),
                color: jsPsych.timelineVariable('color'),
                condition: jsPsych.timelineVariable('condition'),
                correct_response: jsPsych.timelineVariable('correct_response')
            },
            on_finish: function(data) {
                // 正誤判定
                data.correct = (data.response === data.correct_response);
            }
        };

        /**
         * (3-c) 試行間隔 (ITI)
         */
        const iti = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: '',
            choices: "NO_KEYS",
            trial_duration: 1000
        };

        /**
         * メイン試行ループの定義
         * 10回ランダムに抽出して繰り返す
         */
        const test_procedure = {
            timeline: [fixation, stroop_trial, iti],
            timeline_variables: stimulus_factors,
            sample: {
                type: 'with-replacement',
                size: 10
            }
        };
        timeline.push(test_procedure);

        // 実行
        jsPsych.run(timeline);
    </script>
</body>
</html>
